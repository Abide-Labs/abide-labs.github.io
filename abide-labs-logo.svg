<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8C96A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8873A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hexagon mark -->
  <polygon points="50,10 70,22 70,46 50,58 30,46 30,22" 
    stroke="url(#goldGrad)" stroke-width="2.5" fill="none"/>

  <!-- Crosshair lines -->
  <line x1="50" y1="10" x2="50" y2="58" stroke="url(#goldGrad)" stroke-width="1.2"/>
  <line x1="30" y1="34" x2="70" y2="34" stroke="url(#goldGrad)" stroke-width="1.2"/>

  <!-- Diamond center -->
  <polygon points="50,27 57,34 50,41 43,34" 
    fill="url(#goldGrad)"/>

  <!-- Wordmark -->
  <text x="88" y="31" font-family="'DM Sans', 'Segoe UI', Arial, sans-serif" 
    font-size="22" font-weight="700" letter-spacing="3" fill="url(#goldGrad)">ABIDE</text>

  <!-- Flanking lines -->
  <line x1="88" y1="41" x2="108" y2="41" stroke="url(#goldGrad)" stroke-width="1"/>
  <text x="116" y="51" font-family="'DM Sans', 'Segoe UI', Arial, sans-serif" 
    font-size="11" font-weight="400" letter-spacing="4" fill="url(#goldGrad)">LABS</text>
  <line x1="152" y1="41" x2="172" y2="41" stroke="url(#goldGrad)" stroke-width="1"/>
</svg>
