<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 70" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8C96A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8873A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hexagon -->
  <polygon points="40,5 62,18 62,44 40,57 18,44 18,18" 
    stroke="url(#goldGrad)" stroke-width="2.5" fill="none"/>

  <!-- Crosshair -->
  <line x1="40" y1="5" x2="40" y2="57" stroke="url(#goldGrad)" stroke-width="1.2"/>
  <line x1="18" y1="31" x2="62" y2="31" stroke="url(#goldGrad)" stroke-width="1.2"/>

  <!-- Diamond -->
  <polygon points="40,22 49,31 40,40 31,31" fill="url(#goldGrad)"/>
</svg>
